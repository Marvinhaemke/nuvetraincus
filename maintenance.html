<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>We'll be back soon</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #0b1f3a 0%, #12315c 100%);
      color: #f4f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 560px;
      width: 100%;
    }
    .logo {
      max-width: 180px;
      height: auto;
      margin: 0 auto 32px;
      display: block;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    p {
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.6;
      color: #c7d3e6;
      margin-bottom: 12px;
    }
    .divider {
      width: 56px;
      height: 3px;
      background: #4a90d9;
      border: 0;
      border-radius: 2px;
      margin: 28px auto;
    }
    .contact {
      font-size: 0.95rem;
      color: #9fb2cf;
    }
    .contact a {
      color: #8fbef0;
      text-decoration: none;
    }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <img src="/Logo.png" alt="Logo" class="logo" onerror="this.style.display='none'" />
    <div class="icon">🛠️</div>
    <h1>We are currently not available</h1>
    <p>Our website is temporarily down for maintenance.</p>
    <p>We're working to get things back up and running as soon as possible. Please check back shortly.</p>
    <hr class="divider" />
    <p class="contact">Thank you for your patience.</p>
  </main>
</body>
</html>
